# Opt-in local sandbox profile for Linux machines with nsjail installed.
# The actual filesystem view is constructed dynamically by sandbox.py using
# an empty chroot plus explicit bind mounts.

mode: ONCE
hostname: "attention-kernel-challenge"
cwd: "/workspace"

clone_newnet: true
iface_no_lo: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true

keep_caps: false
mount_proc: false
disable_proc: true

time_limit: 180
max_cpus: 4

rlimit_as: 8192
rlimit_cpu: 120
rlimit_fsize: 64
rlimit_nofile: 256
rlimit_nproc: 64

seccomp_string: "KILL { execve, execveat, ptrace, process_vm_readv, process_vm_writev, bpf, kexec_load, finit_module, init_module, delete_module } DEFAULT ALLOW"
